<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🐱 Kitten Tennis Pro</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="screen-menu" class="screen active">
  <div class="menu-container">
    <div class="game-title"><h1>🐾 Kitten Tennis 🎾</h1></div>
    <div class="nick-row">
      <input type="text" id="nick-input" placeholder="Твой ник..." maxlength="12" />
    </div>
    
    <div class="skin-select">
      <p>Выбери кота:</p>
      <div class="skin-options">
        <div class="skin-opt active" data-skin="gray">🔘</div>
        <div class="skin-opt" data-skin="black">⚫</div>
        <div class="skin-opt" data-skin="orange">🟠</div>
        <div class="skin-opt" data-skin="white">⚪</div>
      </div>
    </div>

    <div class="menu-buttons">
      <button class="btn btn-primary" id="btn-create">Создать лобби</button>
      <button class="btn btn-secondary" id="btn-bot">Играть с ботом 🤖</button>
      <button class="btn btn-accent" id="btn-join-toggle">Ввести код</button>
    </div>
    <div id="join-form" class="join-form hidden">
      <input type="text" id="room-code-input" placeholder="Код..." />
      <button class="btn" id="btn-join-confirm">🐾 Го!</button>
    </div>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="game-ui">
    <div class="score-board">
      <span id="score-p1">0</span> : <span id="score-p2">0</span>
    </div>
    <div id="combo-badge" class="hidden">🔥 x0</div>
  </div>
  <canvas id="game-canvas"></canvas>
</div>

<script src="socket.js"></script>
<script src="game.js"></script>
</body>
</html>
