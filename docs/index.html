<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🐱 Kitten Tennis</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- MENU -->
<div id="s-menu" class="screen active">
  <div class="card">
    <div class="logo">🐾 Kitten Tennis 🎾</div>
    <p class="sub">Милый теннис для двоих!</p>
    <div class="field">
      <label>Твой ник</label>
      <input id="inp-nick" type="text" maxlength="14" placeholder="Введи ник..." autocomplete="off"/>
    </div>
    <button class="btn pink" id="btn-create">🏠 Создать комнату</button>
    <button class="btn teal" id="btn-join-show">🔗 Войти в комнату</button>
    <div id="join-box" class="hidden">
      <input id="inp-code" type="text" maxlength="10" placeholder="Код комнаты (CATXXXX)" autocomplete="off"/>
      <button class="btn orange" id="btn-join">🐾 Войти!</button>
      <p id="join-err" class="err hidden"></p>
    </div>
    <div id="wait-box" class="wait-box hidden">
      <p class="wlabel">Скинь код другу:</p>
      <div class="code-show" id="code-show">...</div>
      <button class="btn small" id="btn-copy">📋 Скопировать</button>
      <div class="waiting">Ждём соперника<span class="dots"></span></div>
    </div>
    <p class="hint">P1: A/D + Пробел (прыжок) + S (вниз) &nbsp;|&nbsp; P2: ←/→ + ↑ + ↓</p>
  </div>
  <div class="dcat left">🐱</div>
  <div class="dcat right">😺</div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="hud">
    <div class="scores">
      <span class="sname" id="sn1">😸 P1</span>
      <span class="snum" id="sc1">0</span>
      <span class="sdiv">vs</span>
      <span class="snum" id="sc2">0</span>
      <span class="sname" id="sn2">P2 😼</span>
    </div>
    <div class="combo hidden" id="combo">🔥 x1</div>
    <div class="roomcode" id="roomcode"></div>
  </div>
  <div class="cvwrap">
    <canvas id="cv"></canvas>
  </div>
  <div class="hint2">P1: A/D + Пробел + S(вниз) &nbsp;|&nbsp; P2: ←/→ + ↑ + ↓(вниз)</div>
</div>

<!-- GAMEOVER -->
<div id="s-over" class="screen">
  <canvas id="confetti" style="position:absolute;inset:0;pointer-events:none"></canvas>
  <div class="over-card">
    <div class="emo" id="emo">🏆</div>
    <h2 id="over-title">Победа!</h2>
    <div class="over-phrase" id="over-phrase"></div>
    <div class="over-score" id="over-score">0 – 0</div>
    <div class="over-stats" id="over-stats"></div>
    <button class="btn pink" id="btn-rematch">🔄 Реванш</button>
    <button class="btn teal" id="btn-tomenu">🏠 Меню</button>
  </div>
</div>

<!-- DISCONNECTED -->
<div id="s-disc" class="overlay hidden">
  <div class="card small-card">
    <div style="font-size:52px">😿</div>
    <p>Соперник отключился!</p>
    <button class="btn pink" id="btn-disc">В меню</button>
  </div>
</div>

<script src="socket.js"></script>
<script src="game.js"></script>
</body>
</html>
